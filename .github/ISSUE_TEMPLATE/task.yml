name: "Задача спринта"
description: "Постановка задачи (заполняет architect)"
title: "[S0X-0YY] <краткое название задачи>"
labels: ["task"]
body:
  - type: input
    id: task_id
    attributes:
      label: "Task ID"
      description: "Идентификатор вида S0X-0YY"
      placeholder: "S02-003"
    validations:
      required: true
  - type: input
    id: sprint
    attributes:
      label: "Спринт"
      placeholder: "sprint-01-mvp"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: "Проект / компонент"
      options:
        - Core
        - Api
        - AddIn
        - Tests
        - docs
        - setup
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: "Цель"
      description: "Зачем задача и какую ценность даёт"
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: "Scope / Анти-scope"
      description: "Что входит и что явно НЕ входит"
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: "Затрагиваемые файлы"
      placeholder: "src/PptPowerKeys.Core/Layout/LayoutEngine.cs, src/PptPowerKeys.AddIn/src/..."
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: "Критерии приёмки (Definition of Done)"
      description: "Проверяемый список. Укажи, что должно проходить: dotnet test PptPowerKeys.sln; для панели — npm run typecheck/build; новую логику — юнит-тесты в PptPowerKeys.Tests без PowerPoint."
    validations:
      required: true
  - type: input
    id: deps
    attributes:
      label: "Зависимости"
      placeholder: "S02-002; внешние факторы"
    validations:
      required: false
