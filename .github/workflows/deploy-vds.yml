name: Deploy API to VDS

# S01-012 (part A): deploy the API to the owner's self-managed VDS over SSH.
# Caddy (docker-compose.yml + Caddyfile) terminates HTTPS via Let's Encrypt.
#
# The deploy steps are gated on the VDS_SSH_KEY secret, so the workflow is safe
# to keep enabled before any server access is configured — without the secret it
# runs the skip notice and succeeds (mirrors deploy.yml's Azure gating).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/PptPowerKeys.Core/**"
      - "src/PptPowerKeys.Api/**"
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose.yml"
      - "Caddyfile"
      - ".github/workflows/deploy-vds.yml"

env:
  # Public hostname Caddy issues the certificate for. The sslip.io host resolves
  # to the VDS IP (95.140.152.103); override with the API_PUBLIC_HOST repo
  # variable to use a custom domain (A-record → IP).
  API_PUBLIC_HOST: ${{ vars.API_PUBLIC_HOST || '95.140.152.103.sslip.io' }}

jobs:
  deploy:
    name: Build & deploy API on VDS over SSH
    runs-on: ubuntu-latest
    # Map the secret to a job-level env so step `if:` conditions can read it.
    # (Secrets are not allowed directly in `if:`, and a step cannot reference its
    # own step-level env in its own `if:` — hence this hop, as in deploy.yml.)
    env:
      VDS_SSH_KEY: ${{ secrets.VDS_SSH_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Package deploy bundle
        if: ${{ env.VDS_SSH_KEY != '' }}
        # Bundle everything into ONE archive so scp copies a single file — a
        # multiline `source:` list confused drone-scp ("empty archive"). Paths are
        # preserved relative to the repo root so the Dockerfile build context on
        # the VDS matches local `docker build .` (Api references Core).
        run: |
          echo "API_PUBLIC_HOST=${API_PUBLIC_HOST}" > .env
          tar czf deploy.tar.gz \
            Dockerfile .dockerignore docker-compose.yml Caddyfile .env \
            src/PptPowerKeys.Core src/PptPowerKeys.Api
          ls -la deploy.tar.gz

      - name: Copy deploy bundle to VDS
        if: ${{ env.VDS_SSH_KEY != '' }}
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_SSH_PORT || 22 }}
          source: deploy.tar.gz
          target: ~/pptpowerkeys

      - name: Build & start containers on VDS
        if: ${{ env.VDS_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v1
        # NOTE: the host key is not pinned, so the runner trusts whatever key the
        # server presents on first contact (a theoretical MITM risk). To harden,
        # add a VDS_SSH_FINGERPRINT secret and pass it via `fingerprint:` here and
        # in the scp step above.
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_SSH_PORT || 22 }}
          command_timeout: 20m
          script: |
            set -e
            cd ~/pptpowerkeys
            tar xzf deploy.tar.gz
            rm -f deploy.tar.gz
            docker compose up -d --build
            docker compose ps

      # Confirms the SSH deploy actually produced a working public HTTPS endpoint
      # (Caddy must also finish provisioning the Let's Encrypt cert), retrying
      # while the build/cert settle.
      - name: Verify API health over HTTPS
        if: ${{ env.VDS_SSH_KEY != '' }}
        run: |
          host="${API_PUBLIC_HOST}"
          echo "Waiting for https://$host/health ..."
          for i in $(seq 1 30); do
            code=$(curl -s -m 10 -o /dev/null -w '%{http_code}' "https://$host/health" || true)
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then echo "API healthy at https://$host/health"; exit 0; fi
            sleep 10
          done
          echo "API did not return 200 from https://$host/health in time"; exit 1

      - name: Skip notice
        if: ${{ env.VDS_SSH_KEY == '' }}
        run: echo "VDS_SSH_KEY secret not set — skipping VDS deploy. Add VDS_HOST/VDS_USER/VDS_SSH_KEY (and optional VDS_SSH_PORT) secrets to enable."
