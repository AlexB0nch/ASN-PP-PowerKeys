name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Core + API (.NET 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore PptPowerKeys.sln

      - name: Build
        run: dotnet build PptPowerKeys.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test PptPowerKeys.sln --configuration Release --no-build --verbosity normal

  addin:
    name: Office Add-in (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/PptPowerKeys.AddIn
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/PptPowerKeys.AddIn/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Validate manifest
        run: npm run validate

      - name: Validate production manifest
        run: npm run validate:prod

      - name: Build
        run: npm run build
